name: Automerge
on:
  pull_request_target:
    types:
      - opened
      - synchronize
jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head
          git log --oneline pr-head -3

      - name: Check file ownership
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const headSha = 'pr-head';
            const baseSha = context.payload.pull_request.base.sha;
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const { execSync } = require('child_process');

            let authorEmail;
            try {
              authorEmail = execSync(
                `git log --format="%ae" -1 ${headSha}`,
                { encoding: 'utf-8' }
              ).trim();
            } catch (e) {
              core.warning(`Could not get author email: ${e.message}, skipping check`);
              return;
            }

            for (const file of files) {
              const filename = file.filename;
              try {
                const existsInBase = execSync(
                  `git show ${baseSha}:"${filename}" > /dev/null 2>&1 && echo 0 || echo 1`,
                  { encoding: 'utf-8' }
                ).trim();

                if (existsInBase === '0') {
                  const log = execSync(
                    `git log --diff-filter=A --follow --format="%ae" -- "${filename}"`,
                    { encoding: 'utf-8' }
                  ).trim();

                  if (!log) {
                    core.setFailed(`File "${filename}" has no creation commit`);
                    return;
                  }

                  const fileCreatorEmail = log.split('\n').pop();

                  if (fileCreatorEmail !== authorEmail) {
                    core.setFailed(
                      `File "${filename}" created by "${fileCreatorEmail}", not "${authorEmail}"`
                    );
                    return;
                  }
                }
              } catch (e) {
                core.warning(`Failed to check "${filename}": ${e.message}`);
              }
            }

            core.info(`All files owned by ${prAuthor}, proceeding with merge`);

      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: 'squash'
              });
              core.info('PR merged successfully');
            } catch (e) {
              core.setFailed(`Merge failed: ${e.message}`);
            }
