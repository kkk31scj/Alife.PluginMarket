name: Automerge
on:
  pull_request_target:
    types:
      - opened
      - synchronize
jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head

      - name: Check file ownership
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const headSha = 'pr-head';
            const baseSha = context.payload.pull_request.base.sha;
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const { execSync } = require('child_process');

            let authorEmail;
            try {
              authorEmail = execSync(
                `git log --format="%ae" -1 ${headSha}`,
                { encoding: 'utf-8' }
              ).trim();
            } catch (e) {
              core.warning(`Could not get author email: ${e.message}`);
              return;
            }

            core.info(`PR Author: ${prAuthor} (${authorEmail})`);
            core.info(`Files changed: ${files.length}`);
            core.info(`---`);

            for (const file of files) {
              const filename = file.filename;
              try {
                const fileCheck = execSync(
                  `git show ${baseSha}:"${filename}" 2>/dev/null && echo "EXISTS" || echo "NEW"`,
                  { encoding: 'utf-8' }
                ).trim();

                if (fileCheck.includes('EXISTS')) {
                  const log = execSync(
                    `git log -1 --format="%ae" -- "${filename}"`,
                    { encoding: 'utf-8' }
                  ).trim();

                  if (!log) {
                    core.setFailed(`File "${filename}" has no commits`);
                    return;
                  }

                  const lastModifierEmail = log;
                  const match = lastModifierEmail === authorEmail;

                  core.info(
                    `[${match ? 'PASS' : 'BLOCKED'}] ${filename} | Last modifier: ${lastModifierEmail} | PR Author: ${authorEmail}`
                  );

                  if (!match) {
                    core.setFailed(
                      `Blocked: "${filename}" last modified by "${lastModifierEmail}", not "${authorEmail}"`
                    );
                    return;
                  }
                } else {
                  core.info(`[NEW] ${filename} - new file, skip check`);
                }
              } catch (e) {
                core.warning(`Check "${filename}" error: ${e.message}`);
              }
            }

            core.info(`---`);
            core.info(`All checks passed, merging...`);

      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: 'squash'
              });
              core.info('Merge successful!');
            } catch (e) {
              core.setFailed(`Merge failed: ${e.message}`);
            }
